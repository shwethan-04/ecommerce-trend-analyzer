services:
  - type: web
    name: ecommerce-trend-analyzer
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./ecommerce_trends.db
      - key: SCRAPE_DELAY
        value: "1.0"
      - key: MAX_RETRIES
        value: "2"
      - key: DEBUG
        value: "false"
